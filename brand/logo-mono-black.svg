<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 88" width="430" height="88" role="img" aria-labelledby="ying-mono-title">
  <title id="ying-mono-title">YING — one-colour black lockup</title>
  <!-- Single-colour lockup. Uses currentColor so CSS can recolour it when inlined. -->
  <g fill="currentColor" color="#000000">
    <g transform="translate(2,12)">
      <polygon points="9,11 15,16 21,11 27,15 33,30 30,33 13,20" fill="currentColor"/>
      <polygon points="55,11 49,16 43,11 37,15 31,30 34,33 51,20" fill="currentColor"/>
      <rect x="29" y="30.5" width="2.6" height="21.5" rx="1" fill="currentColor"/>
      <rect x="32.4" y="30.5" width="2.6" height="21.5" rx="1" fill="currentColor"/>
    </g>
    <text x="84" y="47" font-family="Sora, 'Segoe UI', sans-serif" font-size="34" font-weight="800" letter-spacing="0.5" fill="currentColor">YING</text>
    <text x="85" y="67" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="2.1" fill="currentColor">YONDER INFRASTRUCTURE NETWORKS GROUP</text>
  </g>
</svg>

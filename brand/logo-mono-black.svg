<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 88" width="430" height="88" role="img" aria-labelledby="ying-mono-title">
  <title id="ying-mono-title">YING — one-colour black lockup</title>
  <!-- Single-colour (black) lockup for faxes, stamps, engraving, single-ink print.
       Uses currentColor so it can be recoloured by CSS when inlined. -->
  <g fill="currentColor" color="#000000">
    <g transform="translate(6,12)">
      <g fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 16 L32 36"/>
        <path d="M49 14 L32 36"/>
        <path d="M32 36 L32 50"/>
      </g>
      <path d="M12 50 H52" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <circle cx="32" cy="36" r="5.2" fill="currentColor"/>
    </g>
    <text x="88" y="47" font-family="Sora, 'Segoe UI', sans-serif" font-size="34" font-weight="800" letter-spacing="0.5" fill="currentColor">YING</text>
    <text x="89" y="67" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="2.1" fill="currentColor">YONDER INFRASTRUCTURE NETWORKS GROUP</text>
  </g>
</svg>

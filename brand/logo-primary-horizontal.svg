<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 88" width="430" height="88" role="img" aria-labelledby="ying-primary-title">
  <title id="ying-primary-title">YING — Yonder Infrastructure Networks Group</title>
  <!-- NOTE: wordmark uses live <text> in Sora/Inter. For print/handoff, outline the text
       (convert to paths) so it renders without the fonts installed. The mark itself is pure vector. -->
  <!-- Mark -->
  <g transform="translate(6,12)">
    <g fill="none" stroke="#0E2C4D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 16 L32 36"/>
      <path d="M49 14 L32 36"/>
      <path d="M32 36 L32 50"/>
    </g>
    <path d="M12 50 H52" fill="none" stroke="#17A2A6" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="36" r="5.2" fill="#17A2A6"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="47" font-family="Sora, 'Segoe UI', sans-serif" font-size="34" font-weight="800" letter-spacing="0.5" fill="#0E2C4D">YING</text>
  <text x="89" y="67" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="2.1" fill="#56657A">YONDER INFRASTRUCTURE NETWORKS GROUP</text>
</svg>
